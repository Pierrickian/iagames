<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Intelligence Artistic Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #f1f5f9;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
      max-width: 900px;
      margin: auto;
    }

    img.logo {
      width: 180px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.8em;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-weight: normal;
      font-size: 1.2em;
      color: #cbd5f5;
      margin-bottom: 40px;
    }

    .core {
      font-size: 1.5em;
      line-height: 1.6;
      margin-bottom: 50px;
    }

    .highlight {
      color: #facc15;
    }

    .cta {
      display: inline-block;
      padding: 15px 30px;
      border: 1px solid #facc15;
      color: #facc15;
      text-decoration: none;
      transition: 0.3s;
    }

    .cta:hover {
      background: #facc15;
      color: black;
    }

    footer {
      margin-top: 80px;
      font-size: 0.9em;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="file_00000000eaa07243a630d92500d3d59a.png" class="logo" alt="logo">

    <!-- TITLE -->
    <h1>Intelligence Artistic Games</h1>

    <h2>
      Jeux de société & jeux vidéo conscients
    </h2>

    <!-- CORE MESSAGE -->
    <div class="core">
      Les joueurs créent les règles.<br>
      Les règles créent le jeu.<br>
      Le jeu crée un moment partagé.
    </div>

    <div class="core">
      Nous révélons <span class="highlight">l’âme du jeu</span>.<br>
      Et nous créons des expériences qui favorisent <span class="highlight">l’expansion</span>.
    </div>

    <!-- CTA -->
    <a href="#" class="cta" onclick="enterGame()">Entrer dans le jeu</a>

    <p id="message" style="margin-top:30px;"></p>

    <script>
     let clicks = 0;

     function enterGame() {
      clicks++;

      const message = document.getElementById("message");

      if (clicks === 2) {
        message.innerText = "Tu reviens ? Reviens encore 4 fois.";
      } 
      else if (clicks > 2 && clicks < 6) {
        message.innerText = "Encore...";
      } 
      else if (clicks === 6) {
        const visitors = Math.floor(Math.random() * 1000) + 1;
        message.innerText = "Tu as gagné. Tu es la " + visitors + "ème personne à faire le tour de la Terre pour te rendre compte que ce site est en construction. Merci pour ce vortex créé.";
      }
     }
    </script>
    <!-- FOOTER -->
    <footer>
      © Intelligence Artistic Games
    </footer>

  </div>

</body>
</html>
